<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — HarVenStyles</title>
  <link rel="icon" type="image/png" href="../assets/icons/HarVen-logo.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="js/modal.js" defer></script>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #080808;
      --bg-2:         #0c0c0c;
      --bg-3:         #0f0f0f;
      --bg-4:         #141414;
      --border:       rgba(255,255,255,0.07);
      --border-soft:  rgba(255,255,255,0.04);
      --cream:        #f5f2ec;
      --cream-dim:    #d4c9b4;
      --muted:        #888077;
      --subtle:       #555;
      --faint:        #333;

      --green:        #7acc8a;
      --green-bg:     rgba(100,200,120,0.08);
      --green-border: rgba(100,200,120,0.20);

      --blue:         #7aaae0;
      --blue-bg:      rgba(100,140,220,0.08);
      --blue-border:  rgba(100,140,220,0.20);

      --lime:         #b4d264;
      --lime-bg:      rgba(180,210,100,0.08);
      --lime-border:  rgba(180,210,100,0.20);

      --red:          #c85050;
      --red-bg:       rgba(200,80,80,0.06);
      --red-border:   rgba(200,80,80,0.20);

      --gold:         #c8a96e;
      --gold-bg:      rgba(200,169,110,0.08);
      --gold-border:  rgba(200,169,110,0.22);

      --lavender:     #a78fc4;
      --lavender-bg:  rgba(167,143,196,0.08);
      --lavender-border: rgba(167,143,196,0.22);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Auth Gate ─────────────────────────────────────────────────── */
    #adminAuthGate {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
    }
    #adminAuthGate.is-visible { display: flex; }
    .auth-gate__title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 0.05em;
      color: var(--cream);
      line-height: 0.95;
      text-align: center;
    }
    .auth-gate__sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
      text-align: center;
    }
    .auth-gate__form {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
      max-width: 340px;
      padding: 0 1.5rem;
    }
    .auth-gate__field { display: flex; flex-direction: column; gap: 0.35rem; }
    .auth-gate__label {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--subtle);
    }
    .auth-gate__input {
      background: var(--bg-3);
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: 'Barlow', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      border-radius: 0;
    }
    .auth-gate__input:focus { border-color: rgba(212,201,180,0.45); }
    .auth-gate__input::placeholder { color: var(--faint); }
    .auth-gate__submit {
      font-family: 'Barlow', sans-serif;
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      background: var(--cream);
      border: 1px solid var(--cream);
      color: var(--bg);
      padding: 0.82rem 1rem;
      cursor: pointer;
      transition: background 0.22s, border-color 0.22s;
      margin-top: 0.25rem;
    }
    .auth-gate__submit:hover { background: var(--cream-dim); border-color: var(--cream-dim); }
    .auth-gate__error {
      font-size: 0.64rem;
      letter-spacing: 0.12em;
      color: var(--red);
      text-align: center;
      min-height: 1.2em;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    .admin-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    .admin-sidebar {
      background: var(--bg-2);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 100;
    }
    .admin-sidebar__brand {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .admin-sidebar__logo-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.4rem;
    }
    .admin-sidebar__logo-placeholder {
      width: 32px;
      height: 32px;
      border-radius: 2px;
      background: var(--bg-4);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .admin-sidebar__name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      color: var(--cream);
    }
    .admin-sidebar__badge {
      display: inline-block;
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.18rem 0.6rem;
      border: 1px solid var(--border);
      margin-top: 0.1rem;
    }
    .admin-sidebar__nav {
      flex: 1;
      padding: 1.5rem 0;
    }
    .admin-sidebar__nav-label {
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--faint);
      padding: 0 1.5rem;
      margin-bottom: 0.5rem;
      margin-top: 1.25rem;
    }
    .admin-sidebar__nav-label:first-child { margin-top: 0; }
    .admin-nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1.5rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtle);
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      transition: color 0.2s, background 0.2s;
      border-left: 2px solid transparent;
    }
    .admin-nav-item:hover,
    .admin-nav-item.is-active {
      color: var(--cream-dim);
      background: rgba(255,255,255,0.03);
      border-left-color: var(--cream-dim);
    }
    .admin-nav-item svg { flex-shrink: 0; opacity: 0.6; }
    .admin-nav-item.is-active svg { opacity: 1; }
    .admin-sidebar__footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .admin-sidebar__city {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--subtle);
      margin-bottom: 0.5rem;
    }
    .admin-sidebar__logout {
      font-family: 'Barlow', sans-serif;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--red-border);
      color: var(--red);
      padding: 0.5rem 1rem;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.2s, border-color 0.2s;
      margin-top: 0.5rem;
    }
    .admin-sidebar__logout:hover {
      background: var(--red-bg);
      border-color: rgba(200,80,80,0.5);
    }

    /* ── Main ─────────────────────────────────────────────────────── */
    .admin-main { min-width: 0; display: flex; flex-direction: column; }

    /* ── Topbar ───────────────────────────────────────────────────── */
    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.25rem 2rem;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .admin-topbar__left { display: flex; align-items: center; gap: 1rem; }
    .admin-topbar__heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.06em;
      color: var(--cream);
    }
    .admin-topbar__sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .admin-topbar__right { display: flex; align-items: center; gap: 0.75rem; }
    .admin-topbar__shop-link {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 0.45rem 1rem;
      border: 1px solid var(--border);
      transition: color 0.2s, border-color 0.2s;
    }
    .admin-topbar__shop-link:hover { color: var(--cream); border-color: rgba(255,255,255,0.2); }
    .admin-hamburger {
      display: none;
      flex-direction: column;
      gap: 4px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .admin-hamburger span {
      display: block;
      width: 20px;
      height: 1px;
      background: var(--cream-dim);
    }

    /* ── Content ──────────────────────────────────────────────────── */
    .admin-content { padding: 2.5rem 2rem; flex: 1; }

    /* ── Section title ────────────────────────────────────────────── */
    .admin-section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 0.04em;
      color: var(--cream);
      line-height: 0.95;
      margin-bottom: 0.35rem;
    }
    .admin-section-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* ── Stats Grid ───────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 3rem;
    }
    .stat-card {
      background: var(--bg-3);
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: background 0.2s;
      cursor: default;
    }
    .stat-card:hover { background: var(--bg-4); }
    .stat-card__label {
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--subtle);
    }
    .stat-card__value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 0.03em;
      line-height: 1;
      color: var(--cream);
    }
    .stat-card__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: auto;
    }
    .stat-card--total    .stat-card__dot { background: var(--cream-dim); }
    .stat-card--pending  .stat-card__dot { background: var(--cream-dim); }
    .stat-card--paid     .stat-card__dot { background: var(--gold); }
    .stat-card--confirmed .stat-card__dot { background: var(--green); }
    .stat-card--shipped  .stat-card__dot { background: var(--blue); }
    .stat-card--delivered .stat-card__dot { background: var(--lime); }

    .stat-card--paid     .stat-card__value { color: var(--gold); }
    .stat-card--confirmed .stat-card__value { color: var(--green); }
    .stat-card--shipped  .stat-card__value { color: var(--blue); }
    .stat-card--delivered .stat-card__value { color: var(--lime); }

    /* ── Controls Row ─────────────────────────────────────────────── */
    .orders-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }
    .orders-search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 340px;
    }
    .orders-search-wrap svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.3;
      pointer-events: none;
    }
    .orders-search {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: 'Barlow', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      padding: 0.7rem 0.9rem 0.7rem 2.4rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .orders-search::placeholder { color: var(--subtle); }
    .orders-search:focus { border-color: rgba(212,201,180,0.3); }

    /* ── Filter Tabs ──────────────────────────────────────────────── */
    .filter-tabs { display: flex; gap: 0; flex-wrap: wrap; }
    .filter-tab {
      font-family: 'Barlow', sans-serif;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-right: none;
      background: transparent;
      color: var(--subtle);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .filter-tab:last-child { border-right: 1px solid var(--border); }
    .filter-tab:hover { color: var(--cream-dim); background: rgba(255,255,255,0.03); }
    .filter-tab.is-active {
      background: rgba(212,201,180,0.1);
      color: var(--cream);
      border-color: rgba(212,201,180,0.3);
    }
    .filter-tab[data-filter="paid"].is-active        { background: var(--gold-bg);     color: var(--gold);    border-color: var(--gold-border); }
    .filter-tab[data-filter="confirmed"].is-active   { background: var(--green-bg);    color: var(--green);   border-color: var(--green-border); }
    .filter-tab[data-filter="shipped"].is-active     { background: var(--blue-bg);     color: var(--blue);    border-color: var(--blue-border); }
    .filter-tab[data-filter="delivered"].is-active   { background: var(--lime-bg);     color: var(--lime);    border-color: var(--lime-border); }

    /* ── Results count ────────────────────────────────────────────── */
    .orders-result-count {
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 1.25rem;
    }

    /* ── Order Card ───────────────────────────────────────────────── */
    .order-card {
      border: 1px solid var(--border);
      background: var(--bg-2);
      margin-bottom: 1.5rem;
      transition: border-color 0.25s;
    }
    .order-card:hover { border-color: rgba(255,255,255,0.11); }
    .order-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border-soft);
      background: var(--bg-3);
    }
    .order-card__header-left { display: flex; flex-direction: column; gap: 0.22rem; }
    .order-card__id {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--faint);
    }
    .order-card__date {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--subtle);
    }
    .order-card__header-right {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-wrap: wrap;
    }
    .order-card__total {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.45rem;
      letter-spacing: 0.05em;
      color: var(--cream);
    }
    .order-card__email {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--subtle);
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── Status pill ──────────────────────────────────────────────── */
    .order-status {
      display: inline-block;
      font-size: 0.52rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.22rem 0.7rem;
      white-space: nowrap;
    }
    .order-status--pending   { background: rgba(212,201,180,0.08); color: var(--cream-dim); border: 1px solid rgba(212,201,180,0.2); }
    .order-status--paid      { background: var(--gold-bg);     color: var(--gold);    border: 1px solid var(--gold-border); }
    .order-status--confirmed { background: var(--green-bg);    color: var(--green);   border: 1px solid var(--green-border); }
    .order-status--shipped   { background: var(--blue-bg);     color: var(--blue);    border: 1px solid var(--blue-border); }
    .order-status--delivered { background: var(--lime-bg);     color: var(--lime);    border: 1px solid var(--lime-border); }
    .order-status--cancelled { background: var(--red-bg);      color: var(--red);     border: 1px solid var(--red-border); }

    .admin-status-select {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #161616;
      color: #fff;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      width: 100%;
      max-width: 220px;
    }
    .admin-status-select:focus { border-color: #888; }
    .delete-order-btn{
  margin-top:8px;
  padding:8px 12px;
  background:#c85050;
  color:#fff;
  border:none;
  cursor:pointer;
  border-radius:4px;
}

.delete-order-btn:hover{
  background:#e06060;
}

    .admin-order-status-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .legend-chip {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .legend-chip--pending   { background: rgba(212,201,180,0.08); color: var(--cream-dim); }
    .legend-chip--paid      { background: var(--gold-bg);  color: var(--gold); }
    .legend-chip--confirmed { background: var(--green-bg); color: var(--green); }
    .legend-chip--shipped   { background: var(--blue-bg);  color: var(--blue); }
    .legend-chip--delivered { background: var(--lime-bg);  color: var(--lime); }

    /* ── Item rows ────────────────────────────────────────────────── */
    .order-items-list { list-style: none; }
    .order-item {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid var(--border-soft);
    }
    .order-item:last-child { border-bottom: none; }
    .order-item__img-wrap {
      width: 64px;
      height: 80px;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--bg-4);
    }
    .order-item__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.45s ease;
    }
    .order-item:hover .order-item__img { transform: scale(1.05); }
    .order-item__img-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1c1c1c, #111);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .order-item__img-placeholder svg { opacity: 0.15; }
    .order-item__info { flex: 1; min-width: 0; }
    .order-item__name {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream);
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .order-item__meta {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 0.22rem;
    }
    .order-item__price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
    }
    .order-item__subtotal {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.82rem;
      color: var(--faint);
      margin-top: 0.1rem;
    }

    /* ── Empty State ──────────────────────────────────────────────── */
    .admin-empty {
      text-align: center;
      padding: 6rem 2rem;
    }
    .admin-empty__icon {
      margin-bottom: 1.5rem;
      opacity: 0.1;
    }
    .admin-empty__title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      letter-spacing: 0.04em;
      line-height: 0.9;
      color: var(--cream);
      margin-bottom: 0.75rem;
    }
    .admin-empty__sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--subtle);
      max-width: 380px;
      margin: 0 auto;
    }

    /* ── No results ───────────────────────────────────────────────── */
    .admin-no-results {
      text-align: center;

    /* ── Mobile overlay sidebar ───────────────────────────────────── */

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 860px) {

  <script>
  (function () {
    'use strict';

    /* ── Constants ─────────────────────────────────────────────── */
    var SESSION_KEY = 'hv_session';
    var ADMIN_EMAIL = 'admin@harvenstyles.com';
    var ADMIN_PASS  = 'HarVenAdmin123';

    /* ── Session helpers ───────────────────────────────────────── */
    function getSession() {
      try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch (e) { return null; }
    }
    function setSession(data) {
      try { localStorage.setItem(SESSION_KEY, JSON.stringify(data)); } catch (e) {}
    }
    function clearSession() {
      try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
    }
    function isAdminSession() {
      var s = getSession();
      return !!(s && s.isAdmin === true);
    }

    /* ── DOM refs — auth gate ──────────────────────────────────── */
    var authGate   = document.getElementById('adminAuthGate');
    var adminApp   = document.getElementById('adminApp');
    var gateEmail  = document.getElementById('gateEmail');
    var gatePass   = document.getElementById('gatePassword');
    var gateSubmit = document.getElementById('gateSubmit');
    var gateError  = document.getElementById('gateError');

    /* ── Access guard ──────────────────────────────────────────── */
    function checkAccess() {
      if (isAdminSession()) {
        authGate.classList.remove('is-visible');
        adminApp.style.display = 'block';
        initDashboard();
      } else {
        authGate.classList.add('is-visible');
        adminApp.style.display = 'none';
      }
    }

    /* ── Gate login ────────────────────────────────────────────── */
    gateSubmit.addEventListener('click', function () {
      gateError.textContent = '';
      var email = (gateEmail.value || '').trim().toLowerCase();
      var pass  = (gatePass.value  || '');
      if (!email || !pass) { gateError.textContent = 'Please enter email and password.'; return; }
      if (email === ADMIN_EMAIL.toLowerCase() && pass === ADMIN_PASS) {
        setSession({ name: 'Admin', email: ADMIN_EMAIL, isAdmin: true, token: '' });
        authGate.classList.remove('is-visible');
        adminApp.style.display = 'block';
        gateEmail.value = '';
        gatePass.value  = '';
        initDashboard();
      } else {
        gateError.textContent = 'Invalid admin credentials.';
        gatePass.value = '';
        gatePass.focus();
      }
    });

    [gateEmail, gatePass].forEach(function (input) {
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') { gateSubmit.click(); } });
    });

    /* ── Logout ────────────────────────────────────────────────── */
    var adminLogoutBtn = document.getElementById('adminLogoutBtn');
    if (adminLogoutBtn) {
      adminLogoutBtn.addEventListener('click', function () {
        clearSession();
        window.location.href = 'index.html';
      });
    }

    /* ── Dashboard init ────────────────────────────────────────── */
    function initDashboard() {
      updateTopbar();
      renderDashboard();
      bindSidebarEvents();
    }

    /* ── DOM refs — dashboard ──────────────────────────────────── */
    var contentEl = document.getElementById('adminContent');
    var topbarSub = document.getElementById('topbarSub');
    var hamburger = document.getElementById('adminHamburger');
    var sidebar   = document.getElementById('adminSidebar');
    var overlay   = document.getElementById('adminOverlay');

    /* ── State ─────────────────────────────────────────────────── */
    var currentFilter = 'all';
    var currentSearch = '';
    var searchTimer   = null;

    /* ── Sidebar events ────────────────────────────────────────── */
    function bindSidebarEvents() {
      if (hamburger) {
        hamburger.addEventListener('click', function () {
          sidebar.classList.toggle('is-open');
          overlay.classList.toggle('is-open');
        });
      }
      if (overlay) {
        overlay.addEventListener('click', function () {
          sidebar.classList.remove('is-open');
          overlay.classList.remove('is-open');
        });
      }
      var navItems = document.querySelectorAll('.admin-nav-item[data-section]');
      navItems.forEach(function (btn) {
        btn.addEventListener('click', function () {
          navItems.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          var section = btn.getAttribute('data-section');
          if (section === 'orders') {
            currentFilter = 'all';
            currentSearch = '';
            renderOrdersView();
          } else {
            renderDashboard();
          }
          sidebar.classList.remove('is-open');
          overlay.classList.remove('is-open');
        });
      });
    }

    /* ── Storage ───────────────────────────────────────────────────
     * FIX: getOrders() now returns orders in their ORIGINAL storage
     * order (oldest→newest, index 0 = first stored).
     * Display reversal (newest first) is handled at render time only,
     * so data-index attributes always map correctly back to storage.
     * ─────────────────────────────────────────────────────────── */
   async function getOrders() {

  var session = JSON.parse(
    localStorage.getItem('hv_session') || '{}'
  );

  var res = await fetch(
    'http://192.168.31.65:5000/api/orders/admin/all',
    {
      headers: {
        Authorization: 'Bearer ' + session.token
      }
    }
  );

  console.log("STATUS:", res.status);

  var data = await res.json();

  console.log("ADMIN API RESPONSE:", data);

  return data;
}


    /* ── Formatting ────────────────────────────────────────────── */
    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function toNum(val) {
      return parseFloat(String(val || 0).replace(/[^\d.]/g, '')) || 0;
    }
    function fmtPrice(val) {
      return '₹' + toNum(val).toLocaleString('en-IN');
    }
    function fmtDate(iso) {
      if (!iso) { return '—'; }
      try {
        var d = new Date(iso);
        return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
               + ' · '
               + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
      } catch (e) { return iso; }
    }
    function getQty(item) {
      return parseInt(item.qty || item.quantity || 1, 10) || 1;
    }

    /* ── Status normalisation ──────────────────────────────────── */
    function normalizeStatus(raw) {
      var s = (raw || '').toLowerCase().trim();
      if (s === 'paid' || s.indexOf('payment') !== -1)                            { return 'paid'; }
      if (s.indexOf('confirm') !== -1 && s.indexOf('pending') === -1)             { return 'confirmed'; }
      if (s.indexOf('ship') !== -1)                                               { return 'shipped'; }
      if (s.indexOf('deliver') !== -1)                                            { return 'delivered'; }
      if (s.indexOf('cancel') !== -1)                                             { return 'cancelled'; }
      return 'pending';
    }

    function getStatusObj(raw) {
      var key = normalizeStatus(raw);
      var map = {
        paid:      { key: 'paid',      label: 'Payment Completed',   cls: 'order-status--paid'      },
        confirmed: { key: 'confirmed', label: 'Order Confirmed',     cls: 'order-status--confirmed' },
        shipped:   { key: 'shipped',   label: 'Shipped',             cls: 'order-status--shipped'   },
        delivered: { key: 'delivered', label: 'Delivered',           cls: 'order-status--delivered' },
        cancelled: { key: 'cancelled', label: 'Cancelled',           cls: 'order-status--cancelled' },
        pending:   { key: 'pending',   label: 'Confirmation Pending',cls: 'order-status--pending'   }
      };
      return map[key] || map.pending;
    }

    /* ── Order total ───────────────────────────────────────────── */
   function computeTotal(order) {
  if (order.total && toNum(order.total) > 0) {
    return toNum(order.total);
  }

  if (order.totalPrice && toNum(order.totalPrice) > 0) {
    return toNum(order.totalPrice);
  }

  if (order.price && toNum(order.price) > 0) {
    return toNum(order.price);
  }

  var items = Array.isArray(order.items) ? order.items : [];

  return items.reduce(function (s, i) {
    return s + toNum(i.price) * getQty(i);
  }, 0);
}


    /* ── Stats ─────────────────────────────────────────────────── */
    function buildStats(orders) {
      var counts = { total: orders.length, pending: 0, paid: 0, confirmed: 0, shipped: 0, delivered: 0 };
      orders.forEach(function (o) {
        var key = normalizeStatus(o.status);
        if (counts.hasOwnProperty(key)) { counts[key]++; } else { counts.pending++; }
      });
      return counts;
    }

    function buildStatsHTML(stats) {
      var cards = [
        { label: 'Total Orders', cls: 'stat-card--total',     val: stats.total     },
        { label: 'Pending',      cls: 'stat-card--pending',   val: stats.pending   },
        { label: 'Paid',         cls: 'stat-card--paid',      val: stats.paid      },
        { label: 'Confirmed',    cls: 'stat-card--confirmed', val: stats.confirmed },
        { label: 'Shipped',      cls: 'stat-card--shipped',   val: stats.shipped   },
        { label: 'Delivered',    cls: 'stat-card--delivered', val: stats.delivered },
      ];
      return '<div class="stats-grid">' +
        cards.map(function (c) {
          return (
            '<div class="stat-card ' + c.cls + '">' +
              '<span class="stat-card__label">' + esc(c.label) + '</span>' +
              '<span class="stat-card__value">' + c.val + '</span>' +
              '<span class="stat-card__dot"></span>' +
            '</div>'
          );
        }).join('') +
      '</div>';
    }

    /* ── Item row ──────────────────────────────────────────────── */
    function buildItemRow(item) {
      var imgSrc  = item.image || item.img || '';
      var imgHtml = imgSrc
        ? '<img src="' + esc(imgSrc) + '" alt="' + esc(item.name) + '" class="order-item__img" loading="lazy" />'
        : '<div class="order-item__img-placeholder">' +
            '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +
          '</div>';
      var unitPrice = toNum(item.price);
      var qty       = getQty(item);
      var subtotal  = unitPrice * qty;
      var metaParts = [];
      if (item.size) { metaParts.push('Size: ' + item.size); }
      metaParts.push('Qty: ' + qty);
      return (
        '<li class="order-item">' +
          '<div class="order-item__img-wrap">' + imgHtml + '</div>' +
          '<div class="order-item__info">' +
            '<p class="order-item__name">' + esc(item.name || 'Unknown Product') + '</p>' +
            '<p class="order-item__meta">' + esc(metaParts.join(' · ')) + '</p>' +
            '<p class="order-item__price">' + fmtPrice(unitPrice) + ' each</p>' +
            (qty > 1 ? '<p class="order-item__subtotal">Subtotal: ' + fmtPrice(subtotal) + '</p>' : '') +
          '</div>' +
        '</li>'
      );
    }

    /* ── Order card ────────────────────────────────────────────────
     * FIX: `storageIndex` is now always the real index into the raw
     * (non-reversed) localStorage array, passed in explicitly from
     * the render loop instead of being computed via indexOf on a
     * derived/reversed array.
     * ─────────────────────────────────────────────────────────── */
    function buildOrderCard(order, storageIndex) {
      var items = Array.isArray(order.items) ? order.items : [];

if (!items.length && order.product) {
  items = [{
    name: order.product,
    price: order.total || 0,
    quantity: 1
  }];
}
      var orderId   = String(order._id || '').slice(-8).toUpperCase() || ('ORD' + (storageIndex + 1));
      var statusObj = getStatusObj(order.status);
      var timestamp = order.createdAt || order.timestamp || '';
      var total     = computeTotal(order);
      var email     = order.email || order.customerEmail || '';

      /* Build select with the currently-stored raw status value selected */
      var statusValues = [
        'Confirmation Pending',
        'Payment Completed',
        'Order Confirmed',
        'Shipped',
        'Delivered',
        'Cancelled'
      ];
      var selectHtml = '<select class="admin-status-select" data-storage-index="' + storageIndex + '">';
       
      statusValues.forEach(function (val) {
        var selected = (order.status === val) ? ' selected' : '';
        selectHtml += '<option value="' + esc(val) + '"' + selected + '>' + esc(val) + '</option>';
      });
      selectHtml += '</select>';
      var deleteButton = '';

if (
  order.status === 'Delivered' ||
  order.status === 'Cancelled'
) {

  deleteButton =
    '<button class="delete-order-btn" data-id="' +
    order._id +
    '">Remove Order</button>';

}

      var itemsHtml = '<ul class="order-items-list">';
      if (items.length) {
        items.forEach(function (item) { itemsHtml += buildItemRow(item); });
      } else {
        itemsHtml +=
          '<li class="order-item">' +
            '<div class="order-item__info">' +
              '<p class="order-item__meta" style="color:var(--faint);font-style:italic;">No item details stored.</p>' +
            '</div>' +
          '</li>';
      }
      itemsHtml += '</ul>';

      return (
        '<div class="order-card">' +
          '<div class="order-card__header">' +
            '<div class="order-card__header-left">' +
              '<span class="order-card__id">Order #' + esc(orderId) + '</span>' +
              '<span class="order-card__date">' + esc(fmtDate(timestamp)) + '</span>' +
              (email ? '<span class="order-card__email">' + esc(email) + '</span>' : '') +
            '</div>' +
           '<div class="order-card__header-right">' +
  '<span class="order-status ' + statusObj.cls + '">' + esc(statusObj.label) + '</span>' +
  selectHtml +
  deleteButton +
  '<span class="order-card__total">' + fmtPrice(total) + '</span>' +
'</div>' +
          '</div>' +
          itemsHtml +
        '</div>'
      );
    }

    /* ── Filter + search ───────────────────────────────────────────
     * FIX: returns objects with { order, storageIndex } so that the
     * correct storage index is always available after filtering,
     * regardless of how many items are filtered out.
     * ─────────────────────────────────────────────────────────── */
    function filterOrders(orders) {
      var query = currentSearch.toLowerCase().trim();
      var result = [];
      orders.forEach(function (order, idx) {
        if (currentFilter !== 'all') {
          if (normalizeStatus(order.status) !== currentFilter) { return; }
        }
        if (query) {
          var orderId  = String(order._id || '').toLowerCase();
          var orderNum = String(idx + 1);
          var items    = Array.isArray(order.items) ? order.items : [];
          var names    = items.map(function (i) { return (i.name || '').toLowerCase(); }).join(' ');
          var emailStr = (order.email || order.customerEmail || '').toLowerCase();
          if (
            orderId.indexOf(query)  === -1 &&
            names.indexOf(query)    === -1 &&
            emailStr.indexOf(query) === -1 &&
            orderNum.indexOf(query) === -1
          ) { return; }
        }
        result.push({ order: order, storageIndex: idx });
      });
      return result;
    }

    /* ── Render: Orders view ─────────────────────────────────────── */
    async function renderOrdersView() {
      /* Raw orders (original storage order, oldest first) */
      var orders = await getOrders();
      /* Display newest-first: reverse a copy for display only */
      var displayOrders = orders.slice().reverse().map(function (order) {
        /* Remap each order to its true storageIndex in the original array */
        return { order: order, storageIndex: orders.indexOf(order) };
      });

      var stats    = buildStats(orders);
      var filtered = filterOrders(
        /* filterOrders receives the display-ordered array with pre-computed storageIndex */
        /* but we need to run it against the display order. Rebuild with display indices. */
        /* Simpler: pass original orders to filterOrders, then reverse for display. */
        orders
      );
      /* filterOrders already iterates in original order; reverse result for newest-first display */
      filtered = filtered.slice().reverse();

      var html = '';
      html += '<div class="admin-section-title">Orders</div>';
      html += '<p class="admin-section-sub">All orders stored in localStorage.</p>';
      html +=
        '<div class="admin-order-status-legend">' +
          '<span class="legend-chip legend-chip--pending">Confirmation Pending</span>' +
          '<span class="legend-chip legend-chip--paid">Paid</span>' +
          '<span class="legend-chip legend-chip--confirmed">Confirmed</span>' +
          '<span class="legend-chip legend-chip--shipped">Shipped</span>' +
          '<span class="legend-chip legend-chip--delivered">Delivered</span>' +
        '</div>';

      if (orders.length === 0) {
        html += buildEmptyState();
        contentEl.innerHTML = html;
        return;
      }

      html += '<div class="orders-controls">' +
        '<div class="orders-search-wrap">' +
          '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          '<input type="search" class="orders-search" id="ordersSearch" placeholder="Search by order ID, product or email…" value="' + esc(currentSearch) + '" />' +
        '</div>' +
        '<div class="filter-tabs">' +
          buildFilterTab('all',       'All ('       + orders.length    + ')') +
          buildFilterTab('pending',   'Pending ('   + stats.pending    + ')') +
          buildFilterTab('paid',      'Paid ('      + stats.paid       + ')') +
          buildFilterTab('confirmed', 'Confirmed (' + stats.confirmed  + ')') +
          buildFilterTab('shipped',   'Shipped ('   + stats.shipped    + ')') +
          buildFilterTab('delivered', 'Delivered (' + stats.delivered  + ')') +
        '</div>' +
      '</div>';

      html += '<p class="orders-result-count">' + filtered.length + ' of ' + orders.length + ' orders shown</p>';

      if (filtered.length === 0) {
        html += '<div class="admin-no-results"><p class="admin-no-results__text">No orders match your current filter or search.</p></div>';
      } else {
        filtered.forEach(function (item) {
          html += buildOrderCard(item.order, item.storageIndex);
        });
      }

      contentEl.innerHTML = html;
      bindOrdersEvents();
    }

    function buildFilterTab(key, label) {
      var active = currentFilter === key ? ' is-active' : '';
      return '<button class="filter-tab' + active + '" data-filter="' + esc(key) + '">' + esc(label) + '</button>';
    }

    /* ── Render: Dashboard ─────────────────────────────────────────
     * FIX: getOrders() no longer reverses internally; newest-first
     * display is done here explicitly with slice().reverse().
     * ─────────────────────────────────────────────────────────── */
    async function renderDashboard() {
      var orders = await getOrders(); 
      var stats  = buildStats(orders);
      var html   = '';

      html += '<div class="admin-section-title">Dashboard</div>';
      html += '<p class="admin-section-sub">A complete overview of all HarVenStyles orders.</p>';
      html += buildStatsHTML(stats);
      html += '<div class="admin-section-title" style="font-size:1.6rem;margin-bottom:0.25rem;">Recent Orders</div>';
      html += '<p class="admin-section-sub">Showing the latest 5 orders. Switch to the Orders tab for the full list.</p>';

      if (orders.length === 0) {
        html += buildEmptyState();
      } else {
        /* Newest 5: reverse copy, take first 5, but keep storageIndex correct */
        var recent = [];
        for (var i = orders.length - 1; i >= 0 && recent.length < 5; i--) {
          recent.push({ order: orders[i], storageIndex: i });
        }
        recent.forEach(function (item) {
          html += buildOrderCard(item.order, item.storageIndex);
        });
      }

      contentEl.innerHTML = html;
      bindOrdersEvents();
    }

    /* ── Empty state ───────────────────────────────────────────── */
    function buildEmptyState() {
      return (
        '<div class="admin-empty">' +
          '<div class="admin-empty__icon">' +
            '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' +
              '<polyline points="14 2 14 8 20 8"/>' +
              '<line x1="16" y1="13" x2="8" y2="13"/>' +
              '<line x1="16" y1="17" x2="8" y2="17"/>' +
            '</svg>' +
          '</div>' +
          '<h2 class="admin-empty__title">No Orders Yet.</h2>' +
          '<p class="admin-empty__sub">Orders placed from the storefront will appear here once stored under <code>hv_orders</code>.</p>' +
        '</div>'
      );
    }


    function bindOrdersEvents() {

/* Filter tabs */
contentEl.querySelectorAll('.filter-tab').forEach(function(tab) {

tab.addEventListener('click', function() {

  currentFilter = tab.getAttribute('data-filter');

  renderOrdersView();

});

});

/* Search input */
var searchInput = document.getElementById('ordersSearch');

if (searchInput) {

searchInput.addEventListener('input', function() {

  clearTimeout(searchTimer);

  var val = searchInput.value;

  searchTimer = setTimeout(function() {

    currentSearch = val;

    renderOrdersView();

  }, 220);

});

}

/* Status selects */
contentEl.querySelectorAll('.admin-status-select').forEach(function(select) {

select.addEventListener('change', async function() {

  var storageIndex =
    parseInt(select.getAttribute('data-storage-index'), 10);

  var orders = await getOrders();

  if (!orders[storageIndex]) return;

  var ok = await showConfirm(
  'Change order status to "' + select.value + '"?'
);

if (!ok) {

  select.value = orders[storageIndex].status;

  return;

}

  await fetch(
    "http://192.168.31.65:5000/api/orders/" +
    orders[storageIndex]._id,
    {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        Authorization:
          "Bearer " +
          JSON.parse(
            localStorage.getItem("hv_session")
          ).token
      },
      body: JSON.stringify({
        status: select.value
      })
    }
  );

  renderDashboard();
  showToast("Order status updated successfully.");

});

});

/* Delete buttons */
contentEl.querySelectorAll('.delete-order-btn').forEach(function(btn) {

btn.addEventListener('click', async function() {

  var ok = await showConfirm("Remove this order permanently?");

if (!ok)
  return;

  var orderId = btn.getAttribute('data-id');

  await fetch(
    "http://192.168.31.65:5000/api/orders/" + orderId,
    {
      method: "DELETE",
      headers: {
        Authorization:
          "Bearer " +
          JSON.parse(
            localStorage.getItem("hv_session")
          ).token
      }
    }
  );

  await renderDashboard();

showToast("Order removed successfully.");

});

});

}

          

    /* ── Topbar subtitle ───────────────────────────────────────── */
    async function updateTopbar() {

  var orders = await getOrders();

  var word = orders.length === 1
    ? 'order'
    : 'orders';

  if (topbarSub) {

    topbarSub.textContent =
      orders.length + ' ' + word + ' total';

  }

}

    /* ── Boot ──────────────────────────────────────────────────── */
    document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    document.addEventListener('keydown', function (e) {
      if (
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && e.key === 'I') ||
        (e.ctrlKey && e.shiftKey && e.key === 'J') ||
        (e.ctrlKey && e.key === 'U')
      ) { e.preventDefault(); }
    });

    checkAccess();

  }());
  
  </script>

(function () {
  var session;

  try {
    session = JSON.parse(localStorage.getItem('hv_session'));
  } catch (e) {
    session = null;
  }

  if (
  !session ||
  !session.isAdmin
) {

  showToast('Access denied. Admin login required.');

  setTimeout(function() {

    window.location.href = 'index.html';

  }, 1500);

}
})();
</script>
